services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodfest
      POSTGRES_PASSWORD: foodfest
      POSTGRES_DB: foodfest
    # No published port: Postgres is reachable only from the api container
    # on this compose network, never from outside this host.
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodfest -d foodfest"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://foodfest:foodfest@postgres:5432/foodfest
    # No published port: the api is reachable only from other containers on
    # this compose network (the web/nginx service proxies to it). Nothing
    # outside this host can hit it directly.
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api-uploads:/app/uploads
      - ./backups:/app/backups
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # One-off team-import job, not started by `docker compose up`. The seed
  # source is gitignored (apps/api/db/seed-data/*.xlsx), so drop the file
  # there on the host first, then run:
  #   docker compose run --rm seed
  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://foodfest:foodfest@postgres:5432/foodfest
    volumes:
      - ./apps/api/db/seed-data:/app/apps/api/db/seed-data:ro
    command: ["npm", "run", "seed:participants", "--workspace", "apps/api"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  postgres-data:
  api-uploads:
