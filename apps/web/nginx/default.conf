server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static SPA assets.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Everything under /api/ is forwarded to the backend on the docker
    # network. Nothing leaves this host: the browser only ever talks to
    # this nginx, which talks to the api container over the internal
    # docker-compose network.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE endpoints (/events/stream, /colors/stream) are long-lived;
        # buffering would delay or break live updates.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }
}
