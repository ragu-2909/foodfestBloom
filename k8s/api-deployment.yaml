apiVersion: apps/v1
kind: Deployment
metadata:
  name: foodfest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foodfest-api
  template:
    metadata:
      labels:
        app: foodfest-api
    spec:
      containers:
        - name: api
          image: foodfest-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: foodfest-config
            - secretRef:
                name: foodfest-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: foodfest-api
spec:
  selector:
    app: foodfest-api
  ports:
    - port: 80
      targetPort: 3000
